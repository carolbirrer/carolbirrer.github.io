<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dra. Caroline Gonçalves Birrer | Cientista de Dados & Pesquisadora</title>
    <meta name="description" content="Doutora pela UFBA. Especialista em Data Science, Machine Learning, análise estatística e visualização de dados para decisões baseadas em evidências.">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ── NAVEGAÇÃO ─────────────────────────────────────── -->
    <nav id="main-nav">
        <a href="#" class="logo">
            <div class="logo-monogram">CB</div>
            <div class="logo-text">
                <span class="logo-name">Dra. Caroline G. Birrer</span>
                <span class="logo-title">Ecóloga &amp; Pesquisadora</span>
            </div>
        </a>
        <ul class="nav-links">
            <li><a href="#sobre">Sobre</a></li>
            <li><a href="#expertise">Expertise</a></li>
            <li><a href="#publicacoes">Publicações</a></li>
            <li><a href="#contato" class="nav-cta">Contato</a></li>
        </ul>
    </nav>

    <!-- ── HERO ──────────────────────────────────────────── -->
    <!-- Renderizado via data/hero.json -->
    <header class="hero" id="hero-section">
        <div class="hero-content" id="hero-content"></div>
        <div class="hero-visual" id="hero-visual"></div>
        <div class="hero-scroll"><span class="scroll-line"></span> Rolar</div>
    </header>

    <!-- ── MÉTRICAS ───────────────────────────────────────── -->
    <div class="stats-bar">
        <div class="stats-grid" id="stats-grid"></div>
    </div>

    <!-- ── SOBRE ──────────────────────────────────────────── -->
    <!-- Renderizado via data/sobre.json -->
    <section id="sobre"></section>

    <!-- ── EXPERTISE ──────────────────────────────────────── -->
    <!-- Renderizado via data/areas.json -->
    <section id="expertise"></section>

    <!-- ── PUBLICAÇÕES ────────────────────────────────────── -->
    <section id="publicacoes">
        <div class="section-header fade-up">
            <span class="label-tag">Produção Científica</span>
            <h2>Trabalhos em Destaque</h2>
            <p class="section-sub">Pesquisa publicada em periódicos de alto impacto e reconhecimento internacional.</p>
        </div>

        <!-- Filtros de tag -->
        <div class="pub-filters fade-up" id="pub-filters" aria-label="Filtrar publicações"></div>

        <!-- Cards renderizados via JS a partir de data/publications.json -->
        <div class="pub-grid" id="pub-grid" aria-live="polite">
            <div class="pub-loading" id="pub-loading">
                <div class="pub-spinner"></div>
                <span>Carregando publicações…</span>
            </div>
        </div>
    </section>

    <!-- ── FOOTER / CONTATO ───────────────────────────────── -->
    <!-- Renderizado via data/contato.json -->
    <footer id="contato"></footer>

    <script src="js/main.js"></script>
</body>
</html>
